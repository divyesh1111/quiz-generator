<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Master Pro</title>
    <base href="/" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Custom Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-in-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'scale-in': 'scaleIn 0.3s ease-out',
                        'bounce-gentle': 'bounceGentle 2s infinite',
                        'pulse-slow': 'pulse 3s infinite',
                        'wiggle': 'wiggle 1s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        scaleIn: {
                            '0%': { opacity: '0', transform: 'scale(0.8)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        },
                        bounceGentle: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        wiggle: {
                            '0%, 100%': { transform: 'rotate(-3deg)' },
                            '50%': { transform: 'rotate(3deg)' },
                        },
                    },
                },
            },
        }
    </script>

    <!-- Custom Component Styles -->
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply font-sans antialiased;
            }
        }

        @layer components {
            .btn-primary {
                @apply bg-indigo-600 text-white px-6 py-3 rounded-xl font-semibold 
                       hover:bg-indigo-700 active:bg-indigo-800 
                       transition-all duration-200 ease-in-out 
                       transform hover:scale-105 active:scale-95
                       shadow-lg hover:shadow-xl;
            }

            .btn-secondary {
                @apply bg-white text-indigo-600 px-6 py-3 rounded-xl font-semibold 
                       border-2 border-indigo-600
                       hover:bg-indigo-50 active:bg-indigo-100 
                       transition-all duration-200 ease-in-out 
                       transform hover:scale-105 active:scale-95
                       shadow-md hover:shadow-lg;
            }

            .btn-success {
                @apply bg-emerald-600 text-white px-6 py-3 rounded-xl font-semibold 
                       hover:bg-emerald-700 active:bg-emerald-800 
                       transition-all duration-200 ease-in-out 
                       transform hover:scale-105 active:scale-95
                       shadow-lg hover:shadow-xl;
            }

            .btn-danger {
                @apply bg-red-600 text-white px-6 py-3 rounded-xl font-semibold 
                       hover:bg-red-700 active:bg-red-800 
                       transition-all duration-200 ease-in-out 
                       transform hover:scale-105 active:scale-95
                       shadow-lg hover:shadow-xl;
            }

            .card {
                @apply bg-white rounded-2xl shadow-lg p-6 
                       transition-all duration-300 ease-in-out;
            }

            .card-hover {
                @apply bg-white rounded-2xl shadow-lg p-6 
                       transition-all duration-300 ease-in-out
                       hover:shadow-2xl hover:-translate-y-1;
            }
        }

        @layer utilities {
            .text-gradient {
                @apply bg-clip-text text-transparent 
                       bg-gradient-to-r from-indigo-600 to-purple-600;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="app">
        <!-- Loading Screen -->
        <div class="flex items-center justify-center min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500">
            <div class="text-center">
                <div class="relative">
                    <div class="w-20 h-20 border-4 border-white/30 rounded-full mx-auto"></div>
                    <div class="w-20 h-20 border-4 border-t-white border-r-transparent border-b-transparent border-l-transparent rounded-full mx-auto absolute top-0 left-1/2 -translate-x-1/2 animate-spin"></div>
                </div>
                <h1 class="mt-6 text-2xl font-bold text-white">Quiz Master Pro</h1>
                <p class="mt-2 text-white/70">Loading your quiz experience...</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none;">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
